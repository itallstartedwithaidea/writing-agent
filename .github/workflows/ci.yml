name: Writing Agent CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run QA check tests
        run: npm test
      
      - name: Lint
        run: npm run lint --if-present

  qa-benchmark:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run phrase blacklist validation
        run: node -e "
          import('./src/utils/phrase-blacklist.js').then(m => {
            console.log('Blacklist loaded:', m.PHRASE_BLACKLIST.length, 'phrases');
            if (m.PHRASE_BLACKLIST.length < 100) {
              console.error('Warning: Blacklist has fewer than 100 phrases');
              process.exit(1);
            }
            console.log('Blacklist validation passed');
          });
        "
      
      - name: Run text analyzer validation
        run: node -e "
          import('./src/utils/text-analysis.js').then(m => {
            const analyzer = new m.TextAnalyzer();
            const stats = analyzer.analyze('This is a test. Short. This is a much longer sentence that contains many more words and demonstrates variance in length.');
            console.log('Analyzer test:', JSON.stringify(stats, null, 2));
            if (stats.sentenceCount !== 3) {
              console.error('Sentence count mismatch');
              process.exit(1);
            }
            console.log('Analyzer validation passed');
          });
        "
