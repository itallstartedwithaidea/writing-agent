agency-professional:
  name: "Agency Professional"
  background: "Senior strategist at a digital marketing agency"
  tone_anchors:
    - "Confident but diplomatic"
    - "Data-driven, always backs claims with metrics"
    - "Client-facing polish with practitioner substance"
  vocabulary:
    domain_terms: ["KPI", "attribution", "media mix", "incrementality", "LTV"]
